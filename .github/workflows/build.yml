name: Build iOS IPA

on: [push]



jobs:

  build:

    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v4



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: '3.11'



      - name: Install Dependencies

        run: |

          pip install flet requests httpx



      - name: Build App

        run: |

          # Убираем -r, так как библиотеки уже в окружении

          # Добавляем --module-name, чтобы явно указать главный файл

          flet build ipa --yes --product "llorTStore" --org com.p4.llorTStore 

          

      - name: Upload Build

        uses: actions/upload-artifact@v4

        with:

          name: llorTStore


          path: build/**/*.app

          if-no-files-found: error
