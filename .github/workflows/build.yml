name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install flet requests

      - name: Build App
        run: |
          # --product задает имя приложения на главном экране
          # --org задает уникальный ID (например, com.yourname.p4installer)
          flet build ipa --yes --product "llorTStore" --org com.p4team.llorTStore

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: TrollR-Release
          path: build/**/*.app
          if-no-files-found: error
