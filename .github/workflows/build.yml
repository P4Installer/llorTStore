name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade flet requests
          # Создаем патч для исправления ошибки 'unicode'
          site_packages=$(python3 -m site --user-site)
          mkdir -p "$site_packages"
          echo "import builtins; builtins.unicode = str" > "$site_packages/sitecustomize.py"

      - name: Build App
        run: |
          # Убеждаемся, что бинарники flet в PATH
          export PATH="$PATH:$(python3 -m site --user-base)/bin"
          
          # Пропускаем flet doctor, если это возможно, или надеемся на патч выше
          flet build ipa --yes --product "llorTStore" --org com.p4.llorTStore

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: llorTStore-IPA
          path: build/ipa/*.ipa
          if-no-files-found: warn
